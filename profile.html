<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile || School of Friendship</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Quicksand', sans-serif;
}

body{
    display:flex;
    background:#f3f3f3;
}

.sidebar{
    width:230px;
    height:100vh;
    background:#560883;
    display:flex;
    flex-direction:column;
    padding-top:20px;
    position:fixed;
    left:0;
    top:0;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo img{
    width:60%;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

.nav-item{
    color:#ffe5fe;
    text-decoration:none;
    padding:15px 25px;
    display:block;
    transition:0.3s;
}

.nav-item:hover{
    background:#a351c9;
    color:white;
}

.nav-item.active{
    background:#a351c9;
    border-left:4px solid #98228a;
    font-weight:bold;
}

.navbutton{
    background:none;
    border:none;
    color:#ffe5fe;
    font-family:'Quicksand', sans-serif;
    font-size:16px;
    cursor:pointer;
    font-weight:bold;
}

.navbutton:hover{
    color:white;
}

.content{
    margin-left:230px;
    padding:30px;
    width:100%;
}

.card{
    background:white;
    border-radius:15px;
    padding:30px;
    width:600px;
    margin:auto;
    box-shadow:0 0 12px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    color:#560883;
    margin-bottom:15px;
}

.alert-box{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.alert-content{
    background:#ffe5fe;
    padding:20px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

.alert-content button{
    padding:10px 20px;
    background:#a351c9;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

</style>
</head>

<body>

<nav class="sidebar">

    <div class="logo">
        <img src="logo.png">
    </div>

    <a href="dashboard.html" class="nav-item">Dashboard</a>
    <a href="notebooks.html" class="nav-item">Virtual Notebooks</a>
    <a href="tasks.html" class="nav-item">Tasks</a>
    <a href="profile.html" class="nav-item active">Profile</a>

    <a class="nav-item">
        <button class="navbutton" id="showAlert">Logout</button>
    </a>

</nav>

<div id="customAlert" class="alert-box">
    <div class="alert-content">
        <h2>Are you SURE you want to log out?</h2>
        <p>(this cannot be undone)</p>
        <button onclick="logout()">I'm sure</button>
    </div>
</div>

<div class="content">

<div class="card">

    <h1>Profile</h1>

    <img id="profileImagePreview"
    src="https://avatarfiles.alphacoders.com/303/thumb-1920-303678.gif"
    style="width:180px;height:180px;border-radius:50%;object-fit:cover;border:3px solid #a351c9;">

    <br><br>

    <button id="chooseFileBtn"
    style="background:#a351c9;color:white;border:none;padding:10px;border-radius:10px;">
    Choose File
    </button>

    <input type="file" id="profileImageInput" accept="image/*" hidden>

    <h3>Student Information</h3>
    <p id="displayArea1"></p>

    <h3>Student ID</h3>
    <div id="randomNumber"></div>

    <h3>Password</h3>
    <p id="displayArea2"></p>

    <h3>Contact</h3>
    <p id="displayArea3"></p>

    <h3>Email</h3>
    <p id="displayArea4"></p>

    <h3>Pony Type</h3>
    <p>Unicorn</p>

</div>

</div>

<script>

const chooseFileBtn=document.getElementById('chooseFileBtn');
const input=document.getElementById('profileImageInput');
const preview=document.getElementById('profileImagePreview');

chooseFileBtn.onclick=()=>input.click();

input.onchange=e=>{
const file=e.target.files[0];
const reader=new FileReader();
reader.onload=()=>preview.src=reader.result;
reader.readAsDataURL(file);
};

document.getElementById("showAlert").onclick=function(){
document.getElementById("customAlert").style.display="flex";
};

function logout(){
localStorage.clear();
window.location.href="index.html";
}

function generate(){
const min=1000000000;
const max=9999999999;
document.getElementById("randomNumber").innerText=
Math.floor(Math.random()*(max-min+1))+min;
}

function display(){
document.getElementById('displayArea1').innerText=localStorage.getItem('sharedText1')||"Data Not Found";
document.getElementById('displayArea2').innerText=localStorage.getItem('sharedText2')||"Data Not Found";
document.getElementById('displayArea3').innerText=localStorage.getItem('sharedText3')||"Data Not Found";
document.getElementById('displayArea4').innerText=localStorage.getItem('sharedText4')||"Data Not Found";
}

window.onload=()=>{
generate();
display();
};

</script>

</body>
</html>
