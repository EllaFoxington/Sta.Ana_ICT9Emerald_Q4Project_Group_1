<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Virtual Notebooks || School of Friendship</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Quicksand', sans-serif;
    display:flex;
    background:#f3f3f3;
}

.sidebar{
    width:230px;
    height:100vh;
    background:#560883;
    display:flex;
    flex-direction:column;
    padding-top:20px;
    position:fixed;
    left:0;
    top:0;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo img{
    width:70%;
    height:auto;
    animation:float 3s ease-in-out infinite;
}

.nav-item{
    color:#ffe5fe;
    text-decoration:none;
    padding:15px 25px;
    display:block;
    transition:0.3s;
}

.nav-item:hover{
    background:#a351c9;
    color:white;
}

.nav-item.active{
    background:#a351c9;
    border-left:4px solid #98228a;
    font-weight:bold;
}

.navbutton{
    background:none;
    border:none;
    color:#ffe5fe;
    font-family:'Quicksand', sans-serif;
    font-size:16px;
    cursor:pointer;
}

.content{
    margin-left:230px;
    padding:30px;
    width:100%;
}

.alert-box{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.alert-content{
    background:#ffe5fe;
    padding:20px;
    border-radius:10px;
    width:300px;
    text-align:center;
}

#searchInput{
    width:300px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

#vnlist{
    list-style:none;
    margin-top:20px;
}

li{
    margin-bottom:15px;
}

.vn-card{
    display:flex;
    align-items:center;
    gap:15px;
}

.vn-card img{
    width:80px;
    height:80px;
    object-fit:cover;
    border-radius:10px;
}

@keyframes float{
    0%{transform:translateY(0%);}
    50%{transform:translateY(-8%);}
    100%{transform:translateY(0%);}
}

</style>
</head>

<body>

<nav class="sidebar">

<div class="logo">
<img src="logo.png">
</div>

<a href="dashboard.html" class="nav-item">Dashboard</a>
<a href="vns.html" class="nav-item active">Virtual Notebooks</a>
<a href="tasks.html" class="nav-item">Tasks</a>
<a href="profile.html" class="nav-item">Profile</a>

<a href="#" class="nav-item">
<button class="navbutton" id="showAlert">Logout</button>
</a>

</nav>

<div id="customAlert" class="alert-box">
<div class="alert-content">
<h2>Are you SURE you want to log out?</h2>
<p>(this cannot be undone)</p>
<button><a href="index.html" style="color:white;text-decoration:none;">I'm sure</a></button>
</div>
</div>

<main class="content">

<input type="search" id="searchInput" placeholder="Search notebooks...">

<ul id="vnlist">

<li>
<a href="pflvn.html">
<div class="vn-card">
<img src="pfl.png">
<span>Practical Friendship Lessons</span>
</div>
</a>
</li>

<li>
<a href="magicartvn.html">
<div class="vn-card">
<img src="magic.png">
<span>Magical Artifacts</span>
</div>
</a>
</li>

<li>
<a href="ponyhistoryvn.html">
<div class="vn-card">
<img src="ponyhis.png">
<span>Pony History</span>
</div>
</a>
</li>

<li>
<a href="anicare.html">
<div class="vn-card">
<img src="animalcare.png">
<span>Animal Care</span>
</div>
</a>
</li>

<li>
<a href="europeanlangvn.html">
<div class="vn-card">
<img src="europeanlang.png">
<span>European Languages</span>
</div>
</a>
</li>

<li>
<a href="potionsvn.html">
<div class="vn-card">
<img src="potions.png">
<span>Potions</span>
</div>
</a>
</li>

<li>
<a href="astronomvn.html">
<div class="vn-card">
<img src="astronomy.png">
<span>Astronomy</span>
</div>
</a>
</li>



<li>
<a href="musicvn.html">
<div class="vn-card">
<img src="music.png">
<span>Music</span>
</div>
</a>
</li>

</ul>

</main>

<script>

const showAlertBtn=document.getElementById("showAlert");
const customAlert=document.getElementById("customAlert");

showAlertBtn.addEventListener("click",()=>{
customAlert.style.display="flex";
});

window.addEventListener("click",(e)=>{
if(e.target==customAlert){
customAlert.style.display="none";
}
});

const searchInput=document.getElementById("searchInput");
const items=document.querySelectorAll("#vnlist li");

searchInput.addEventListener("keyup",function(){
const filter=this.value.toLowerCase();

items.forEach(item=>{
item.style.display=item.textContent.toLowerCase().includes(filter)?"":"none";
});
});

</script>

</body>
</html>
