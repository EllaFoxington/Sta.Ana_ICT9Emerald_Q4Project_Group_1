<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tasks || School of Friendship</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Quicksand', sans-serif;
}

body{
    display:flex;
    background:#f3f3f3;
}

.sidebar{
    width:230px;
    height:100vh;
    background:#560883;
    display:flex;
    flex-direction:column;
    padding-top:20px;
    position:fixed;
    left:0;
    top:0;
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo img{
    width:60%;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

.nav-item{
    color:#ffe5fe;
    text-decoration:none;
    padding:15px 25px;
    display:block;
    transition:0.3s;
}

.nav-item:hover{
    background:#a351c9;
    color:white;
}

.nav-item.active{
    background:#a351c9;
    border-left:4px solid #98228a;
    font-weight:bold;
}

.logout{
    font-weight:bold;
}

.content{
    margin-left:230px;
    padding:30px;
    width:100%;
    padding-bottom:140px;
}

.dashboard-box{
    background:#3d0d50;
    color:white;
    padding:15px 25px;
    border-radius:15px;
    font-size:28px;
    font-weight:bold;
    margin-bottom:20px;
}

.card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 12px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:12px;
    margin:10px 0;
}

.title{
    font-size:18px;
    font-weight:bold;
    color:#8531b6;
}

.task-highlight{
    background:#f3e6ff;
    padding:6px;
    border-radius:8px;
    margin-top:8px;
    font-weight:600;
    color:#560883;
}

.progress-bar{
    width:100%;
    height:12px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-top:10px;
}

.progress{
    height:100%;
    width:0%;
    background:#a351c9;
    transition:0.5s;
}

button{
    margin-top:12px;
    padding:10px;
    width:100%;
    border:none;
    border-radius:10px;
    background:#a351c9;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#98228a;
}

.footer{
    position:fixed;
    bottom:0;
    left:230px;
    right:0;
    background:#ffe5fe;
    padding:15px;
    border-top:3px solid #a351c9;
}

.alert-box{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.alert-content{
    background:#ffe5fe;
    padding:20px;
    border-radius:10px;
    width:300px;
    text-align:center;
}
</style>
</head>

<body>

<nav class="sidebar">

<div class="logo">
<img src="logo.png">
</div>

<a href="index.html" class="nav-item">Dashboard</a>
<a href="notebooks.html" class="nav-item">Virtual Notebooks</a>
<a href="tasks.html" class="nav-item active">Tasks</a>
<a href="profile.html" class="nav-item">Profile</a>

<a href="login.html" class="nav-item logout">Logout</a>

</nav>

<div class="content">

<div class="dashboard-box">Tasks</div>

<div class="card-grid" id="grid"></div>

</div>

<div class="footer">
<b>Friendship Level ✨</b>
<div class="progress-bar">
<div id="friendshipBar" class="progress"></div>
</div>
<p id="friendshipText">0% Complete 💖</p>
</div>

<div id="popup" class="alert-box">
<div class="alert-content">
<h2>🎉 Congrats!</h2>
<p>Task completed for the day 💖</p>
<button onclick="closePopup()">YAY</button>
</div>
</div>

<script>

const tasks=[
{title:"Friendship Lessons",bio:"Kindness & teamwork",img:"https://i.pinimg.com/736x/7f/76/4a/7f764aefbff2842768a6e9874af7f6dd.jpg",task:"Make bracelet ✨",points:20},
{title:"Magical Artifacts",bio:"Sparkling treasures",img:"https://i.pinimg.com/736x/ff/29/59/ff2959628d95050620d2ad9a6f8a92ce.jpg",task:"Find elements 💎",points:20},
{title:"History",bio:"Pony stories",img:"https://i.pinimg.com/736x/cf/c7/55/cfc755a18152233baa04ea4284dc7d7b.jpg",task:"Draw pony 👑",points:20},
{title:"Animal Care",bio:"Help creatures",img:"https://i.pinimg.com/736x/51/50/be/5150be233c690ceea826ea62c72b242f.jpg",task:"Feed animals 🐰",points:20},
{title:"Music",bio:"Dance & sing",img:"https://i.pinimg.com/736x/af/55/d8/af55d898b09c3f5a14af8cfcdf2b9dbf.jpg",task:"Pony dance 🎶",points:20}
];

let friendship=0;

function render(){
let grid=document.getElementById("grid");
grid.innerHTML="";
tasks.forEach((t,i)=>{
grid.innerHTML+=`
<div class="card">
<div class="title">${t.title}</div>
<div>${t.bio}</div>
<img src="${t.img}">
<div class="task-highlight">${t.task}</div>

<div class="progress-bar">
<div class="progress" id="bar${i}"></div>
</div>

<button onclick="completeTask(${i},this)">Complete</button>
</div>`;
});
}

function completeTask(i,btn){
btn.disabled=true;
btn.innerText="Done ✔";

document.getElementById("bar"+i).style.width="100%";

friendship+=tasks[i].points;
if(friendship>100)friendship=100;

update();

if(friendship>=100){
document.getElementById("popup").style.display="flex";
}
}

function update(){
document.getElementById("friendshipBar").style.width=friendship+"%";
document.getElementById("friendshipText").innerText=friendship+"% Complete 💖";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

render();
update();

</script>

</body>
</html>
